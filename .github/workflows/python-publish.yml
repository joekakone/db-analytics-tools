name: Upload Python Package

on:
  push:
    branches:
      # IMPORTANT : Vérifiez si votre branche principale s'appelle 'main' ou 'master'
      - main
      - master

permissions:
  contents: read
  # Requis pour la publication sécurisée sans mot de passe (OIDC / Trusted Publishing)
  id-token: write 

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Mise à jour vers v4 (utilise Node 20, évite les messages d'avertissement de GitHub)
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Mise à jour vers v5 (inclut le système de cache automatique pour accélérer le build)
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build

    - name: Build package
      run: python -m build

    # 3. Publication sur PyPI
    # Nous utilisons la version stable officielle (@release/v1) au lieu d'un commit SHA figé.
    - name: Publish package to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      # RECOMMANDATION : Si vous configurez le "Trusted Publishing" sur votre compte PyPI,
      # vous n'avez plus besoin de configurer de secret (secrets.PYPI_API_TOKEN).
      # 
      # Si vous préférez conserver votre jeton d'API statique actuel, 
      # supprimez "id-token: write" dans les permissions et décommentez les lignes ci-dessous :
      with:
        user: __token__
        password: ${{ secrets.PYPI_API_TOKEN }}
