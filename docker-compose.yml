services:
  db-analytics-tools-ui:
    image: joekakone/db-analytics-tools-ui:0.1
    build:
      context: .
      dockerfile: Dockerfile.ui
    ports:
      - "8050:8050"
    volumes:
      - ./config_v2.json:/app/config_v2.json
      - db_cron_data:/var/spool/cron/crontabs
    networks:
      - db-analytics-tools-network
      - deploy-data-warehouse_analytics-network

volumes:
  db_cron_data:
    driver: local

networks:
  db-analytics-tools-network:
    driver: bridge
  deploy-data-warehouse_analytics-network:
    external: true
