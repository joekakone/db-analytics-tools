services:
  db-analytics-tools-ui:
    image: joekakone/db-analytics-tools-ui:latest
    restart: always
    ports:
      - "8050:8050"
    volumes:
      - ./config.json:/app/config.json
      - db_cron_data:/var/spool/cron/crontabs
    networks:
      - db-analytics-tools-network

volumes:
  db_cron_data:
    driver: local

networks:
  db-analytics-tools-network:
    driver: bridge
